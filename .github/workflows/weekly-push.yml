name: 每周一推送
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      issue:
        description: "指定期号（留空则自动推送下一期）"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 确定本期号
        id: num
        run: |
          if [ -n "${{ github.event.inputs.issue }}" ]; then
            N="${{ github.event.inputs.issue }}"
          else
            N=$(cat next_issue.txt 2>/dev/null || echo "1")
          fi
          echo "issue=$N" >> $GITHUB_OUTPUT
      - name: 推送微信
        run: |
          N=${{ steps.num.outputs.issue }}
          FILE=$(printf "%02d" "$N")
          TITLE=$(grep -oP '<div class="model">\K[^<]+' "${FILE}.html" 2>/dev/null | head -1 || echo "敬请期待")
          H3=$(grep -oP '<h3>\K[^<]+' "${FILE}.html" 2>/dev/null | head -1 || echo "")
          curl -s "https://sctapi.ftqq.com/${{ secrets.SERVERCHAN_SENDKEY }}.send" \
            -d "title=芒格计划 · 第${N}期" \
            -d "desp=📐 ${TITLE}｜${H3}｜[点击阅读 →](https://zhuayuba.github.io/mungerplan/${FILE}.html)"
      - name: 计数器+1
        run: |
          N=${{ steps.num.outputs.issue }}
          echo $((N + 1)) > next_issue.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add next_issue.txt
          git diff --staged --quiet || git commit -m "→ 下期 #$((N + 1))"
          git push
