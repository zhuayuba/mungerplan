name: 每周一推送
on:
  schedule:
    - cron: "0 12 * * 1"  # UTC 12:00 = 北京时间 20:00
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 发送最新期到微信
        run: |
          LATEST=$(ls [0-9]*.html 2>/dev/null | sort -n | tail -1 | sed 's/.html//')
          TITLE=$(grep -oP '<div class="model">\K[^<]+' "${LATEST}.html" | head -1)
          H3=$(grep -oP '<h3>\K[^<]+' "${LATEST}.html" | head -1)

          curl -s "https://sctapi.ftqq.com/${{ secrets.SERVERCHAN_SENDKEY }}.send" \
            -d "title=芒格计划 · 第${LATEST}期" \
            -d "desp=📐 ${TITLE}｜${H3}｜[点击阅读 →](https://zhuayuba.github.io/mungerplan/${LATEST}.html)"
